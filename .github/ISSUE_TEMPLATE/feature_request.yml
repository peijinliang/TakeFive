name: 功能建议
description: 提议新的使用场景或改进现有体验
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        TakeFive 优先保证可靠、本地、低打扰。请先描述用户问题，再描述具体方案。

  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 这个问题在什么场景发生？当前为什么不够用？
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述期望的行为、入口和结果，不需要先决定技术实现。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案

  - type: dropdown
    id: platform
    attributes:
      label: 适用平台
      options:
        - Windows
        - macOS
        - Windows 和 macOS
        - 与平台无关
    validations:
      required: true

  - type: checkboxes
    id: principles
    attributes:
      label: 产品边界
      options:
        - label: 该建议可以保持本地优先，不要求默认上传用户数据。
          required: true
        - label: 该建议不会把不能错过的医疗或安全责任交给 TakeFive。
          required: true
        - label: 我已搜索现有 Issue，未发现相同建议。
          required: true
