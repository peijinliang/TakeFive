name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows:
    name: Build Windows release
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Verify release version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}" -replace '^v', ''
          $configVersion = (Get-Content apps/desktop/src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $packageVersion = (Get-Content apps/desktop/package.json | ConvertFrom-Json).version
          $desktopVersion = ((cargo metadata --no-deps --format-version 1 | ConvertFrom-Json).packages | Where-Object name -eq 'takefive-desktop').version
          if ($tagVersion -ne $configVersion -or $tagVersion -ne $packageVersion -or $tagVersion -ne $desktopVersion) {
            throw "Tag v$tagVersion must match tauri.conf.json ($configVersion), package.json ($packageVersion), and takefive-desktop Cargo.toml ($desktopVersion)."
          }

      - name: Build signed updater and draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: TakeFive ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: --bundles nsis
